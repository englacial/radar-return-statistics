opr:
  cache_dir: null

region:
  area: "antarctic"
  subregion: "G-H"

query:
  # Seasons with layer picks and Heading variable available in the ASE (G-H subregion).
  # Excluded: 2002/2004 P3chile (no OPR layer picks), 2009-2011 DC8/TO (missing Heading
  # variable), 2013 P3 (spatial outlier near 180° meridian, not in ASE).
  collections:
    - "2012_Antarctica_DC8"
    - "2014_Antarctica_DC8"
    - "2016_Antarctica_DC8"
    - "2018_Antarctica_DC8"
  max_items: null

processing:
  data_product: "CSARP_standard"
  decimate_interval: "10s"
  layer_margin_m: 50
  ice_permittivity: 3.17
  max_workers: 20
  noise:
    pre_surface:
      start_offset_us: 1.0   # window starts this far after twtt_axis[0]
      end_offset_us: 1.0     # window ends this far before surface pick
    post_bed:
      start_offset_us: 5.0   # window starts this far after bed pick
      end_offset_us: 5.0     # window ends this far before twtt_axis[-1]

qc:
  max_heading_change_deg_per_km: 2.0  # mask traces with heading change above this (deg/km)
  min_ice_thickness_m: 100           # skip traces below this ice thickness (e.g. 500)
  min_agl_m: 50                     # skip traces where AGL is below this (e.g. 100)
  min_bed_snr_db: null                # skip traces where bed SNR is below this (e.g. 5.0)
  min_traces_after_qc: 15             # skip frame entirely if fewer traces survive QC

store:
  backend: "s3"
  s3_bucket: "opr-radar-metrics"
  s3_prefix: "icechunk/ase"
  s3_region: "us-west-2"
  remove_out_of_scope: false  # if true, delete stored frames not matched by current query
