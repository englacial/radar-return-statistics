opr:
  cache_dir: "./radar_cache/"

region:
  area: "antarctic"

query:
  collections:
    - "2008_Antarctica_BaslerJKB"
    - "2016_Antarctica_BaslerJKB"
    - "2017_Antarctica_BaslerJKB"
    - "2018_Antarctica_BaslerJKB"
  max_items: null

processing:
  data_product: "CSARP_standard"
  decimate_interval: "5s"
  layer_margin_m: 50
  ice_permittivity: 3.17
  max_workers: 20

qc:
  max_heading_change_deg_per_km: 2.0
  min_ice_thickness_m: 100
  min_agl_m: 50
  min_bed_snr_db: null
  min_traces_after_qc: 15

store:
  backend: "s3"
  s3_bucket: "opr-radar-metrics"
  s3_prefix: "icechunk/utig"
  s3_region: "us-west-2"
  remove_out_of_scope: true
